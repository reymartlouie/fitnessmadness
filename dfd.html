<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FitnessMadness — DFD</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f4;
      padding: 40px 20px;
      color: #111;
    }
    h1 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-bottom: 40px;
    }
    .section {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 28px 32px;
      max-width: 820px;
      margin: 0 auto 36px auto;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin-bottom: 20px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }
    svg { display: block; margin: 0 auto; }
    @media print { body { background: #fff; } }
  </style>
</head>
<body>

<h1>FitnessMadness Gym System</h1>
<div class="subtitle">Context Diagram &amp; Data Flow Diagram — Level 1</div>

<!-- ── Context Diagram ─────────────────────────────────── -->
<div class="section">
  <div class="section-title">Context Diagram (Level 0)</div>
  <svg width="740" height="160" viewBox="0 0 740 160">
    <defs>
      <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#555"/>
      </marker>
    </defs>

    <!-- Member -->
    <rect x="20" y="55" width="120" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="80" y="85" text-anchor="middle" font-size="13" font-weight="600">Member</text>

    <!-- System -->
    <ellipse cx="370" cy="80" rx="130" ry="52" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="370" y="76" text-anchor="middle" font-size="13" font-weight="700">FitnessMadness</text>
    <text x="370" y="94" text-anchor="middle" font-size="11" fill="#555">Gym System</text>

    <!-- Admin -->
    <rect x="600" y="55" width="120" height="50" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="660" y="85" text-anchor="middle" font-size="13" font-weight="600">Admin / Owner</text>

    <!-- Member → System -->
    <line x1="140" y1="72" x2="240" y2="72" stroke="#555" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="190" y="66" text-anchor="middle" font-size="10" fill="#333">Check-in / Check-out</text>

    <!-- System → Member -->
    <line x1="240" y1="92" x2="140" y2="92" stroke="#555" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="190" y="108" text-anchor="middle" font-size="10" fill="#333">Confirmation / Records</text>

    <!-- Admin → System -->
    <line x1="600" y1="72" x2="500" y2="72" stroke="#555" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="550" y="66" text-anchor="middle" font-size="10" fill="#333">Manage / Payments</text>

    <!-- System → Admin -->
    <line x1="500" y1="92" x2="600" y2="92" stroke="#555" stroke-width="1.4" marker-end="url(#a)"/>
    <text x="550" y="108" text-anchor="middle" font-size="10" fill="#333">Reports / Alerts / CSV</text>
  </svg>
</div>

<!-- ── DFD Level 1 ─────────────────────────────────────── -->
<div class="section">
  <div class="section-title">DFD Level 1</div>
  <svg width="740" height="460" viewBox="0 0 740 460">
    <defs>
      <marker id="b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#555"/>
      </marker>
    </defs>

    <!-- ── External Entities ── -->
    <!-- Member -->
    <rect x="20" y="20" width="110" height="44" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="75" y="47" text-anchor="middle" font-size="13" font-weight="600">Member</text>

    <!-- Admin -->
    <rect x="610" y="20" width="120" height="44" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="670" y="47" text-anchor="middle" font-size="13" font-weight="600">Admin / Owner</text>

    <!-- ── Processes ── -->
    <!-- P1 Check In/Out -->
    <ellipse cx="130" cy="170" rx="80" ry="38" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="130" y="166" text-anchor="middle" font-size="11" font-weight="600">1.0 Check In</text>
    <text x="130" y="182" text-anchor="middle" font-size="11" font-weight="600">/ Check Out</text>

    <!-- P2 Manage Members -->
    <ellipse cx="370" cy="170" rx="80" ry="38" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="370" y="166" text-anchor="middle" font-size="11" font-weight="600">2.0 Manage</text>
    <text x="370" y="182" text-anchor="middle" font-size="11" font-weight="600">Members</text>

    <!-- P3 Record Payments -->
    <ellipse cx="610" cy="170" rx="80" ry="38" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="610" y="166" text-anchor="middle" font-size="11" font-weight="600">3.0 Record</text>
    <text x="610" y="182" text-anchor="middle" font-size="11" font-weight="600">Payments</text>

    <!-- P4 View Reports -->
    <ellipse cx="610" cy="360" rx="80" ry="38" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="610" y="356" text-anchor="middle" font-size="11" font-weight="600">4.0 View</text>
    <text x="610" y="372" text-anchor="middle" font-size="11" font-weight="600">Reports</text>

    <!-- ── Data Stores ── -->
    <!-- D1 Members -->
    <line x1="240" y1="295" x2="490" y2="295" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="240" y1="325" x2="490" y2="325" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="240" y="295" width="250" height="30" fill="#f5f3ff" stroke="none"/>
    <text x="248" y="315" font-size="11" fill="#5b21b6" font-weight="600">D1   Members</text>

    <!-- D2 Attendance -->
    <line x1="20" y1="370" x2="220" y2="370" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="20" y1="400" x2="220" y2="400" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="20" y="370" width="200" height="30" fill="#f5f3ff" stroke="none"/>
    <text x="28" y="390" font-size="11" fill="#5b21b6" font-weight="600">D2   Attendance Logs</text>

    <!-- D3 Payments -->
    <line x1="240" y1="370" x2="490" y2="370" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="240" y1="400" x2="490" y2="400" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="240" y="370" width="250" height="30" fill="#f5f3ff" stroke="none"/>
    <text x="248" y="390" font-size="11" fill="#5b21b6" font-weight="600">D3   Payments</text>

    <!-- ── Arrows ── -->

    <!-- Member → P1 -->
    <line x1="75" y1="64" x2="100" y2="132" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>
    <text x="60" y="105" font-size="10" fill="#333">Name + ID</text>

    <!-- P1 → D2 (attendance log) -->
    <line x1="130" y1="208" x2="120" y2="368" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>
    <text x="62" y="305" font-size="10" fill="#333">Attendance</text>
    <text x="62" y="318" font-size="10" fill="#333">Record</text>

    <!-- D2 → Member (confirmation) -->
    <line x1="20" y1="370" x2="42" y2="210" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>
    <text x="2" y="295" font-size="10" fill="#333">OK /</text>
    <text x="2" y="307" font-size="10" fill="#333">Denied</text>

    <!-- P1 ↔ D1 (verify member) -->
    <line x1="190" y1="185" x2="272" y2="295" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>
    <text x="212" y="248" font-size="10" fill="#333">Verify</text>
    <line x1="268" y1="295" x2="188" y2="190" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>

    <!-- Admin → P2 -->
    <line x1="640" y1="64" x2="435" y2="132" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>
    <text x="520" y="92" font-size="10" fill="#333">Member Details</text>

    <!-- P2 ↔ D1 -->
    <line x1="370" y1="208" x2="365" y2="293" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>
    <text x="375" y="258" font-size="10" fill="#333">Add/Edit</text>
    <line x1="355" y1="293" x2="350" y2="210" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>

    <!-- Admin → P3 -->
    <line x1="670" y1="64" x2="648" y2="130" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>
    <text x="680" y="105" font-size="10" fill="#333">Payment</text>
    <text x="680" y="118" font-size="10" fill="#333">Amount</text>

    <!-- P3 → D3 -->
    <line x1="610" y1="208" x2="490" y2="368" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>
    <text x="548" y="305" font-size="10" fill="#333">Save</text>

    <!-- P3 → D1 (renew) -->
    <line x1="550" y1="175" x2="492" y2="300" stroke="#555" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#b)"/>
    <text x="492" y="238" font-size="10" fill="#888">Renew</text>

    <!-- D1 → P4 -->
    <line x1="490" y1="310" x2="535" y2="335" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>

    <!-- D2 → P4 -->
    <line x1="220" y1="385" x2="528" y2="370" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>

    <!-- D3 → P4 -->
    <line x1="490" y1="385" x2="530" y2="370" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>

    <!-- P4 → Admin -->
    <line x1="688" y1="335" x2="700" y2="66" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/>
    <text x="706" y="210" font-size="10" fill="#333">CSV /</text>
    <text x="706" y="223" font-size="10" fill="#333">Reports</text>
  </svg>

  <!-- Legend -->
  <div style="display:flex;gap:24px;justify-content:center;margin-top:16px;font-size:11px;color:#555;flex-wrap:wrap">
    <span><svg width="18" height="14"><rect x="1" y="1" width="16" height="12" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/></svg> External Entity</span>
    <span><svg width="18" height="14"><ellipse cx="9" cy="7" rx="8" ry="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/></svg> Process</span>
    <span><svg width="24" height="14"><line x1="0" y1="3" x2="24" y2="3" stroke="#7c3aed" stroke-width="1.5"/><line x1="0" y1="11" x2="24" y2="11" stroke="#7c3aed" stroke-width="1.5"/></svg> Data Store</span>
    <span><svg width="24" height="14"><line x1="0" y1="7" x2="18" y2="7" stroke="#555" stroke-width="1.3" marker-end="url(#b)"/></svg> Data Flow</span>
  </div>
</div>

</body>
</html>
