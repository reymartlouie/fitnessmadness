<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FitnessMadness — DFD</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f4;
      padding: 40px 20px;
      color: #111;
    }
    h1 { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { text-align: center; font-size: 12px; color: #888; margin-bottom: 40px; }
    .section {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 28px 32px;
      max-width: 860px;
      margin: 0 auto 36px auto;
    }
    .section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; color: #888; margin-bottom: 20px;
      border-bottom: 1px solid #eee; padding-bottom: 8px;
    }
    svg { display: block; margin: 0 auto; }
    .legend {
      display: flex; gap: 24px; justify-content: center;
      margin-top: 16px; font-size: 11px; color: #555; flex-wrap: wrap;
    }
    @media print { body { background: #fff; } }
  </style>
</head>
<body>

<h1>FitnessMadness Gym System</h1>
<div class="subtitle">Context Diagram &amp; Data Flow Diagram — Level 1</div>

<!-- ── Context Diagram ─────────────────────────────────── -->
<div class="section">
  <div class="section-title">Context Diagram (Level 0)</div>
  <svg width="760" height="160" viewBox="0 0 760 160">
    <defs>
      <marker id="ca" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#555"/>
      </marker>
    </defs>

    <!-- Member -->
    <rect x="20" y="55" width="120" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="80" y="85" text-anchor="middle" font-size="13" font-weight="600">Member</text>

    <!-- System -->
    <ellipse cx="380" cy="80" rx="135" ry="52" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="380" y="76" text-anchor="middle" font-size="13" font-weight="700">FitnessMadness</text>
    <text x="380" y="94" text-anchor="middle" font-size="11" fill="#555">Gym System</text>

    <!-- Admin -->
    <rect x="620" y="55" width="120" height="50" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="680" y="85" text-anchor="middle" font-size="13" font-weight="600">Admin / Owner</text>

    <!-- Member → System -->
    <line x1="140" y1="72" x2="245" y2="72" stroke="#555" stroke-width="1.4" marker-end="url(#ca)"/>
    <text x="193" y="66" text-anchor="middle" font-size="10" fill="#333">Check-in / Check-out</text>

    <!-- System → Member -->
    <line x1="245" y1="92" x2="140" y2="92" stroke="#555" stroke-width="1.4" marker-end="url(#ca)"/>
    <text x="193" y="108" text-anchor="middle" font-size="10" fill="#333">Confirmation / Records</text>

    <!-- Admin → System -->
    <line x1="620" y1="72" x2="515" y2="72" stroke="#555" stroke-width="1.4" marker-end="url(#ca)"/>
    <text x="568" y="66" text-anchor="middle" font-size="10" fill="#333">Manage / Payments</text>

    <!-- System → Admin -->
    <line x1="515" y1="92" x2="620" y2="92" stroke="#555" stroke-width="1.4" marker-end="url(#ca)"/>
    <text x="568" y="108" text-anchor="middle" font-size="10" fill="#333">Reports / Alerts / CSV</text>
  </svg>
</div>

<!-- ── DFD Level 1 ─────────────────────────────────────── -->
<div class="section">
  <div class="section-title">DFD Level 1</div>
  <svg width="800" height="540" viewBox="0 0 800 540">
    <defs>
      <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#555"/>
      </marker>
    </defs>

    <!-- ══ EXTERNAL ENTITIES ══ -->
    <!-- Member -->
    <rect x="30" y="30" width="110" height="48" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="85" y="59" text-anchor="middle" font-size="13" font-weight="600">Member</text>

    <!-- Admin / Owner -->
    <rect x="640" y="30" width="130" height="48" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="705" y="59" text-anchor="middle" font-size="13" font-weight="600">Admin / Owner</text>

    <!-- ══ PROCESSES ══ -->
    <!-- 1. Check In / Checkout -->
    <rect x="18" y="188" width="155" height="50" rx="20" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="95" y="210" text-anchor="middle" font-size="12" font-weight="600">1. Check In /</text>
    <text x="95" y="228" text-anchor="middle" font-size="12" font-weight="600">Checkout</text>

    <!-- 2. Manage Members -->
    <rect x="298" y="30" width="165" height="50" rx="20" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="380" y="52" text-anchor="middle" font-size="12" font-weight="600">2. Manage</text>
    <text x="380" y="70" text-anchor="middle" font-size="12" font-weight="600">Members</text>

    <!-- 3. Record Payments -->
    <rect x="622" y="188" width="158" height="50" rx="20" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="701" y="210" text-anchor="middle" font-size="12" font-weight="600">3. Record</text>
    <text x="701" y="228" text-anchor="middle" font-size="12" font-weight="600">Payments</text>

    <!-- 4. View Reports -->
    <rect x="308" y="400" width="145" height="50" rx="20" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="380" y="422" text-anchor="middle" font-size="12" font-weight="600">4. View</text>
    <text x="380" y="440" text-anchor="middle" font-size="12" font-weight="600">Reports</text>

    <!-- ══ DATA STORES ══ -->
    <!-- Members -->
    <line x1="295" y1="248" x2="505" y2="248" stroke="#7c3aed" stroke-width="1.8"/>
    <line x1="295" y1="282" x2="505" y2="282" stroke="#7c3aed" stroke-width="1.8"/>
    <rect x="295" y="248" width="210" height="34" fill="#f5f3ff" stroke="none"/>
    <text x="400" y="270" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="600">Members</text>

    <!-- Attendance Logs -->
    <line x1="15" y1="390" x2="185" y2="390" stroke="#7c3aed" stroke-width="1.8"/>
    <line x1="15" y1="424" x2="185" y2="424" stroke="#7c3aed" stroke-width="1.8"/>
    <rect x="15" y="390" width="170" height="34" fill="#f5f3ff" stroke="none"/>
    <text x="100" y="412" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="600">Attendance Logs</text>

    <!-- Payments -->
    <line x1="570" y1="390" x2="770" y2="390" stroke="#7c3aed" stroke-width="1.8"/>
    <line x1="570" y1="424" x2="770" y2="424" stroke="#7c3aed" stroke-width="1.8"/>
    <rect x="570" y="390" width="200" height="34" fill="#f5f3ff" stroke="none"/>
    <text x="670" y="412" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="600">Payments</text>

    <!-- ══ ARROWS ══ -->

    <!-- Member → 1.CheckIn: Name & ID -->
    <line x1="85" y1="78" x2="85" y2="186" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="55" y="140" font-size="10" fill="#333">Name &amp; ID</text>

    <!-- 1.CheckIn → Members: verify -->
    <line x1="173" y1="213" x2="293" y2="255" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="208" y="228" font-size="10" fill="#333">verify</text>

    <!-- 2.ManageMembers ↓ Members: add -->
    <line x1="368" y1="80" x2="368" y2="246" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="348" y="170" font-size="10" fill="#333">add</text>

    <!-- Members ↑ 2.ManageMembers: edit -->
    <line x1="392" y1="246" x2="392" y2="82" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="396" y="170" font-size="10" fill="#333">edit</text>

    <!-- Admin → 2.ManageMembers: Member Details -->
    <line x1="640" y1="55" x2="465" y2="55" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="548" y="48" text-anchor="middle" font-size="10" fill="#333">Member Details</text>

    <!-- Admin ↓ 3.RecordPayments -->
    <line x1="705" y1="78" x2="705" y2="186" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

    <!-- 3.RecordPayments → Members: Renew -->
    <line x1="622" y1="220" x2="507" y2="260" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="548" y="233" font-size="10" fill="#333">Renew</text>

    <!-- 3.RecordPayments ↓ Payments: save -->
    <line x1="701" y1="238" x2="680" y2="388" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="710" y="318" font-size="10" fill="#333">save</text>

    <!-- 1.CheckIn ↓ AttendanceLogs: Attendance Record -->
    <line x1="78" y1="238" x2="78" y2="388" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="82" y="320" font-size="10" fill="#333">Attendance</text>
    <text x="82" y="333" font-size="10" fill="#333">Record</text>

    <!-- AttendanceLogs ↑ 1.CheckIn: OK / Denied -->
    <line x1="108" y1="388" x2="108" y2="240" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="114" y="320" font-size="10" fill="#333">OK /</text>
    <text x="114" y="333" font-size="10" fill="#333">Denied</text>

    <!-- Payments → 4.ViewReports: payment amount -->
    <line x1="570" y1="407" x2="455" y2="428" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="498" y="408" text-anchor="middle" font-size="10" fill="#333">payment amount</text>

    <!-- Members ↓ 4.ViewReports -->
    <line x1="400" y1="282" x2="400" y2="398" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>

    <!-- 4.ViewReports → Admin: CSV / Reports (bottom long arrow) -->
    <line x1="453" y1="440" x2="700" y2="480" stroke="#555" stroke-width="1.4"/>
    <line x1="700" y1="480" x2="720" y2="80" stroke="#555" stroke-width="1.4" marker-end="url(#arr)"/>
    <text x="735" y="295" font-size="10" fill="#333">CSV /</text>
    <text x="735" y="308" font-size="10" fill="#333">Reports</text>

  </svg>

  <!-- Legend -->
  <div class="legend">
    <span>
      <svg width="40" height="18" style="vertical-align:middle">
        <rect x="1" y="1" width="38" height="16" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
      </svg>
      External Entity
    </span>
    <span>
      <svg width="60" height="18" style="vertical-align:middle">
        <rect x="1" y="1" width="58" height="16" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
      </svg>
      Process
    </span>
    <span>
      <svg width="40" height="18" style="vertical-align:middle">
        <line x1="0" y1="4" x2="40" y2="4" stroke="#7c3aed" stroke-width="1.5"/>
        <rect x="0" y="4" width="40" height="10" fill="#f5f3ff" stroke="none"/>
        <line x1="0" y1="14" x2="40" y2="14" stroke="#7c3aed" stroke-width="1.5"/>
      </svg>
      Data Store
    </span>
    <span>→ Data Flow</span>
  </div>
</div>

</body>
</html>
