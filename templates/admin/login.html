<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — {{ gym_name }}</title>
    <script>(function(){var t=localStorage.getItem('fm-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/bootstrap-icons.min.css') }}" rel="stylesheet">
    <style>
        :root {
            --bg:           #f5f5f7;
            --surface:      #ffffff;
            --surface-alt:  #f5f5f7;
            --border:       #e5e5e7;
            --text:         #2e2e2e;
            --text-muted:   #6e6e73;
            --text-subtle:  #aeaeb2;
            --accent:       #d62929;
            --accent-hover: #b52020;
            --accent-subtle:rgba(214, 41, 41, 0.08);
            --input-bg:     #ffffff;
            --input-border: #d2d2d7;
        }
        [data-theme="dark"] {
            --bg:           #0f0f0f;
            --surface:      #1c1c1e;
            --surface-alt:  #2c2c2e;
            --border:       #3a3a3c;
            --text:         #f2f2f7;
            --text-muted:   #8e8e93;
            --text-subtle:  #636366;
            --accent:       #e5383b;
            --accent-hover: #c82828;
            --accent-subtle:rgba(229, 56, 59, 0.12);
            --input-bg:     #2c2c2e;
            --input-border: #3a3a3c;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .login-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            position: relative;
        }
        .login-card h2 {
            font-weight: 700;
            color: var(--text);
        }
        .form-control {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--input-border) !important;
            color: var(--text) !important;
            padding: 0.75rem 1rem;
            border-radius: 10px;
        }
        .form-control:focus {
            background-color: var(--input-bg) !important;
            border-color: var(--accent) !important;
            color: var(--text) !important;
            box-shadow: 0 0 0 0.2rem var(--accent-subtle) !important;
        }
        .form-control::placeholder { color: var(--text-subtle) !important; }
        .form-label { color: var(--text-muted) !important; }
        .input-group-text {
            background-color: var(--surface-alt) !important;
            border: 1px solid var(--input-border) !important;
            color: var(--text-muted) !important;
        }
        p, small, .text-muted { color: var(--text-muted) !important; }
        [data-theme="dark"] .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }
        .btn-login {
            background-color: var(--accent);
            border: none;
            color: #fff;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: background-color 0.2s;
        }
        .btn-login:hover {
            background-color: var(--accent-hover);
            color: #fff;
        }
        .brand {
            color: var(--accent);
            font-weight: 800;
            font-size: 1.5rem;
        }
        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: var(--accent); }
        .btn-theme {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-theme:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <button class="btn-theme" onclick="toggleTheme()" aria-label="Toggle theme">
            <i id="theme-icon"></i>
        </button>
        <div class="text-center mb-4">
            <div class="brand">{{ gym_name }}</div>
            <h2 class="mt-2">Admin Login</h2>
            <p class="text-muted small">Sign in to access the dashboard</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label text-muted small">Username</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" name="username" class="form-control"
                           placeholder="Enter username" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small">Password</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" name="password" class="form-control"
                           placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('kiosk.index') }}" class="back-link">
                <i class="bi bi-arrow-left me-1"></i>Back to Kiosk
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script>
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('fm-theme', next);
            updateThemeIcon(next);
        }
        function updateThemeIcon(theme) {
            const icon = document.getElementById('theme-icon');
            if (icon) icon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
        }
        updateThemeIcon(document.documentElement.getAttribute('data-theme') || 'light');
    </script>
</body>
</html>
