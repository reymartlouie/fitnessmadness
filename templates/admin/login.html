<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — {{ gym_name }}</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/bootstrap-icons.min.css') }}" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f7;
            color: #2e2e2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .login-card {
            background-color: #ffffff;
            border: 1px solid #e5e5e7;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
        }
        .login-card h2 {
            font-weight: 700;
            color: #2e2e2e;
        }
        .form-control {
            background-color: #ffffff !important;
            border: 1px solid #d2d2d7 !important;
            color: #2e2e2e !important;
            padding: 0.75rem 1rem;
            border-radius: 10px;
        }
        .form-control:focus {
            background-color: #ffffff !important;
            border-color: #d62929 !important;
            color: #2e2e2e !important;
            box-shadow: 0 0 0 0.2rem rgba(214, 41, 41, 0.15) !important;
        }
        .form-control::placeholder { color: #aeaeb2 !important; }
        .form-label { color: #6e6e73 !important; }
        .input-group-text {
            background-color: #f5f5f7 !important;
            border: 1px solid #d2d2d7 !important;
            color: #6e6e73 !important;
        }
        p, small, .text-muted { color: #6e6e73 !important; }
        .btn-login {
            background-color: #d62929;
            border: none;
            color: #fff;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: background-color 0.2s;
        }
        .btn-login:hover {
            background-color: #b52020;
            color: #fff;
        }
        .brand {
            color: #d62929;
            font-weight: 800;
            font-size: 1.5rem;
        }
        .back-link {
            color: #6e6e73;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: #d62929;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="brand">{{ gym_name }}</div>
            <h2 class="mt-2">Admin Login</h2>
            <p class="text-muted small">Sign in to access the dashboard</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label text-muted small">Username</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" name="username" class="form-control"
                           placeholder="Enter username" required autofocus>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small">Password</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" name="password" class="form-control"
                           placeholder="Enter password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('kiosk.index') }}" class="back-link">
                <i class="bi bi-arrow-left me-1"></i>Back to Kiosk
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
